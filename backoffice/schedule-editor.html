<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>업데이트 일정 편집기</title>
<link rel="stylesheet" href="style.css" />
</head>
<body data-store="schedule">
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <small>Nosearch Backoffice</small>
        <strong>콘텐츠 운영 센터</strong>
      </div>
      <nav class="nav">
        <a href="index.html">대시보드</a>
        <a href="submain-editor.html">노써치픽 서브메인</a>
        <a href="guide-editor.html">구매가이드</a>
        <a href="encyclopedia-editor.html">가전백과</a>
        <a href="wiki-editor.html">위키검색</a>
        <a class="is-active" href="schedule-editor.html">업데이트 일정</a>
      </nav>
    </aside>

    <main class="content">
      <section class="hero">
        <span class="eyebrow">Schedule Editor</span>
        <h1>In The Lab와 전체 일정 보드를 같이 관리합니다.</h1>
        <p>홈의 In The Lab 문구, 서브메인의 다음 일정 요약, 전체 업데이트 보드에 들어갈 날짜 감각을 한 화면에서 다루도록 구성했습니다.</p>
      </section>

      <section class="section">
        <div class="section-head">
          <div>
            <h2>업데이트 일정 편집</h2>
            <p>카테고리 상태, 다음 점검일, 운영 메모를 빠르게 정리합니다.</p>
          </div>
        </div>

        <form data-editor-form>
          <div class="grid-2">
            <article class="panel">
              <div class="inline-2">
                <div class="field">
                  <label for="schedule-category">카테고리</label>
                  <select id="schedule-category" name="category">
                    <option>공기청정기</option>
                    <option>노트북</option>
                    <option>로봇청소기</option>
                    <option>제습기</option>
                  </select>
                </div>
                <div class="field">
                  <label for="schedule-status">상태</label>
                  <select id="schedule-status" name="status">
                    <option>정상</option>
                    <option>모니터링</option>
                    <option>우선 업데이트</option>
                  </select>
                </div>
              </div>
              <div class="field">
                <label for="nextDate">다음 점검일</label>
                <input id="nextDate" name="nextDate" type="date" />
              </div>
              <div class="field">
                <label for="inLabCopy">In The Lab 문구</label>
                <input id="inLabCopy" name="inLabCopy" />
              </div>
            </article>

            <article class="panel">
              <div class="field">
                <label for="submainSummary">서브메인 하단 일정 요약</label>
                <input id="submainSummary" name="submainSummary" />
              </div>
              <div class="field">
                <label for="schedule-note">운영 메모</label>
                <textarea id="schedule-note" name="note"></textarea>
              </div>
            </article>
          </div>

          <div class="save-bar">
            <div class="save-status" data-save-status>아직 저장 기록이 없습니다.</div>
            <div class="action-row">
              <button class="primary" type="button" data-save>저장</button>
              <button class="secondary" type="button" data-reset>샘플로 되돌리기</button>
              <button class="ghost" type="button" data-export>JSON 내보내기</button>
              <a class="secondary" href="../update-schedule.html">사용자 페이지 보기</a>
            </div>
          </div>
        </form>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
